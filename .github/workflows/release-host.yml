name: release-host

# Builds the macOS .dmg for the desktop host app and attaches it to the GitHub
# Release, then (optionally) bumps the Homebrew cask in the tap repo.
#
# Trigger: publishing a GitHub Release with a numeric tag (e.g. v0.1.0).
# Manual runs are supported via workflow_dispatch for testing (no upload unless
# a matching release exists).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (numeric, e.g. 0.1.0). Defaults to the release tag."
        required: false

permissions:
  contents: write

jobs:
  build-dmg:
    name: Build & attach macOS .dmg
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up jdk 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Accept android sdk licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Resolve version
        id: version
        run: |
          RAW="${{ github.event.release.tag_name || github.event.inputs.version }}"
          VERSION="${RAW#v}"
          if [ -z "$VERSION" ]; then
            echo "::error::No version resolved from release tag or workflow input."
            exit 1
          fi
          if ! echo "$VERSION" | grep -Eq '^[0-9]+(\.[0-9]+){0,2}$'; then
            echo "::error::Version '$VERSION' is not numeric MAJOR[.MINOR][.PATCH] (jpackage requirement)."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building host version $VERSION"

      - name: Build .dmg
        run: ./gradlew :host:packageDmg -Plivewire.hostVersion=${{ steps.version.outputs.version }} --stacktrace

      - name: Rename to canonical asset name & checksum
        id: asset
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          SRC=$(find host/build/compose/binaries -name '*.dmg' | head -1)
          if [ -z "$SRC" ]; then
            echo "::error::No .dmg produced under host/build/compose/binaries"
            find host/build/compose -type f || true
            exit 1
          fi
          ASSET="Livewire-${VERSION}.dmg"
          cp "$SRC" "$ASSET"
          SHA=$(shasum -a 256 "$ASSET" | awk '{print $1}')
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          {
            echo "## Homebrew cask values"
            echo ""
            echo "- **version:** \`$VERSION\`"
            echo "- **sha256:** \`$SHA\`"
            echo "- **asset:** \`$ASSET\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload .dmg to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ steps.asset.outputs.asset }}" --clobber

      - name: Upload .dmg as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Livewire-dmg
          path: ${{ steps.asset.outputs.asset }}

    outputs:
      version: ${{ steps.version.outputs.version }}
      sha256: ${{ steps.asset.outputs.sha256 }}

  update-cask:
    name: Bump Homebrew cask
    needs: build-dmg
    runs-on: ubuntu-latest
    # Only runs for real releases, and only once the tap repo + token exist.
    # Add a repo secret named HOMEBREW_TAP_TOKEN (a PAT with `contents:write` on
    # livewire-kt/homebrew-tap) to activate this job.
    if: ${{ github.event_name == 'release' && github.event.release.prerelease == false }}
    steps:
      - name: Check for tap token
        id: guard
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping cask bump. Update the cask manually (see homebrew/README.md)."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tap
        if: steps.guard.outputs.enabled == 'true'
        uses: actions/checkout@v6
        with:
          repository: livewire-kt/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update cask
        if: steps.guard.outputs.enabled == 'true'
        working-directory: tap
        run: |
          set -euo pipefail
          VERSION="${{ needs.build-dmg.outputs.version }}"
          SHA="${{ needs.build-dmg.outputs.sha256 }}"
          CASK="Casks/livewire.rb"
          sed -i -E "s|^  version \".*\"|  version \"$VERSION\"|" "$CASK"
          sed -i -E "s|^  sha256 \".*\"|  sha256 \"$SHA\"|" "$CASK"
          git config user.name "livewire-bot"
          git config user.email "bot@livewire.dev"
          git add "$CASK"
          git commit -m "livewire $VERSION" || { echo "No changes to commit"; exit 0; }
          git push
